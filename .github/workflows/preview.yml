name: preview

on:
  pull_request_target:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  preview:
    if: |
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR head
        if: github.event.action != 'closed'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-go@v5
        if: github.event.action != 'closed'
        with:
          go-version: '1.23'
          cache: true

      - name: Build (ARM64)
        if: github.event.action != 'closed'
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" -o lyrics-api-go .

      - name: SSH setup
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Teardown
        if: github.event.action == 'closed'
        id: teardown
        run: |
          PR=${{ github.event.pull_request.number }}
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo /usr/local/bin/preview-teardown.sh $PR"

      - name: Deploy
        if: github.event.action != 'closed'
        id: deploy
        run: |
          PR=${{ github.event.pull_request.number }}
          scp -i ~/.ssh/id_ed25519 lyrics-api-go \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/lyrics-api-pr-$PR
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo /usr/local/bin/preview-deploy.sh $PR"

      - name: Comment on PR
        if: always()
        env:
          PREVIEW_DOMAIN: ${{ vars.PREVIEW_DOMAIN }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const shortSha = sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const url = `https://pr-${pr}.${process.env.PREVIEW_DOMAIN}`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const commitUrl = `${context.serverUrl}/${owner}/${repo}/commit/${sha}`;
            const now = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
            const marker = '<!-- preview-deploy-comment -->';
            const action = context.payload.action;
            const deployOutcome = '${{ steps.deploy.outcome }}';
            const teardownOutcome = '${{ steps.teardown.outcome }}';

            let state;
            if (action === 'closed') {
              state = teardownOutcome === 'success' ? 'torndown' : 'teardown_failed';
            } else if (deployOutcome === 'success') {
              state = 'live';
            } else {
              state = 'failed';
            }

            const bodies = {
              live: [
                marker,
                '### Your preview is live',
                '',
                `**[${url}](${url})**`,
                '',
                '| Detail | Value |',
                '| :-- | :-- |',
                '| Status | `Live` |',
                `| Branch | \`${branch}\` |`,
                `| Commit | [\`${shortSha}\`](${commitUrl}) |`,
                `| Updated | ${now} |`,
                `| Health | [\`/health\`](${url}/health) |`,
                `| Stats | [\`/stats\`](${url}/stats) |`,
                `| Workflow | [run #${context.runId}](${runUrl}) |`,
                '',
                '<sub>Spin it. Break it. Close the PR to clean up. Capped at 2 concurrent previews.</sub>',
              ],
              failed: [
                marker,
                '### Preview deploy failed',
                '',
                `Couldn't bring up the preview for this PR.`,
                '',
                '| Detail | Value |',
                '| :-- | :-- |',
                '| Status | `Failed` |',
                `| Branch | \`${branch}\` |`,
                `| Commit | [\`${shortSha}\`](${commitUrl}) |`,
                `| Workflow | [run #${context.runId}](${runUrl}) |`,
                '',
                '<sub>Likely causes: the 2-preview cap was hit, the build errored, or the health check timed out. The workflow log has the details.</sub>',
              ],
              torndown: [
                marker,
                '### Preview torn down',
                '',
                `This PR's ephemeral environment was cleaned up.`,
                '',
                '| Detail | Value |',
                '| :-- | :-- |',
                '| Status | `Torn down` |',
                `| Branch | \`${branch}\` |`,
                `| Last commit | [\`${shortSha}\`](${commitUrl}) |`,
                `| Closed | ${now} |`,
                `| Workflow | [run #${context.runId}](${runUrl}) |`,
                '',
                '<sub>Reopen the PR if you need to spin it back up.</sub>',
              ],
              teardown_failed: [
                marker,
                '### Teardown failed',
                '',
                `Couldn't fully clean up the preview environment.`,
                '',
                '| Detail | Value |',
                '| :-- | :-- |',
                '| Status | `Teardown failed` |',
                `| Branch | \`${branch}\` |`,
                `| Workflow | [run #${context.runId}](${runUrl}) |`,
                '',
                `<sub>Manual cleanup may be required: <code>ssh hetzner sudo /usr/local/bin/preview-teardown.sh ${pr}</code></sub>`,
              ],
            };
            const body = bodies[state].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr,
            });

            const matching = comments.filter(c => c.body && c.body.startsWith(marker));
            for (const c of matching.slice(1)) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
            }

            const legacy = comments.filter(c =>
              c.user && c.user.type === 'Bot' &&
              c.body && !c.body.startsWith(marker) &&
              /preview\.lyrics-api\.boidu\.dev|Preview deploy failed/.test(c.body)
            );
            for (const c of legacy) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
            }

            const target = matching[0];
            if ((state === 'torndown' || state === 'teardown_failed') && !target && legacy.length === 0) {
              return;
            }

            if (target) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: target.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr, body,
              });
            }
